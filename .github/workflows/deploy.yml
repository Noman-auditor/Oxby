name: 🔒 VAULT — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Syntax check backend JS files
        run: |
          echo "Checking JS syntax..."
          node --check backend/server.js
          node --check backend/services/bitcoin.js
          node --check backend/services/wallet.js
          node --check backend/services/price.js
          node --check backend/routes/wallet.js
          node --check backend/routes/transactions.js
          node --check backend/routes/market.js
          node --check backend/middleware/auth.js
          echo "✅ All files passed syntax check"

      - name: Verify required files exist
        run: |
          echo "Checking required files..."
          test -f backend/server.js           && echo "✓ backend/server.js"
          test -f backend/services/bitcoin.js && echo "✓ backend/services/bitcoin.js"
          test -f backend/services/wallet.js  && echo "✓ backend/services/wallet.js"
          test -f backend/routes/wallet.js    && echo "✓ backend/routes/wallet.js"
          test -f backend/routes/transactions.js && echo "✓ backend/routes/transactions.js"
          test -f backend/middleware/auth.js  && echo "✓ backend/middleware/auth.js"
          test -f public/index.html           && echo "✓ public/index.html"
          test -f vercel.json                 && echo "✓ vercel.json"
          test -f package.json               && echo "✓ package.json"
          echo "✅ All required files present"

  preview:
    name: 🔍 Preview Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g vercel@latest
      - run: npm install
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: echo "url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Preview Ready\n**URL:** ${{ steps.deploy.outputs.url }}\n**Health:** ${{ steps.deploy.outputs.url }}/api/health\n**Commit:** \`${{ github.sha }}\``
            })

  production:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g vercel@latest
      - run: npm install
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: echo "url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
      - name: Smoke test
        run: |
          sleep 10
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/api/health")
          [ "$CODE" = "200" ] && echo "✅ Health OK" || (echo "❌ Failed HTTP $CODE" && exit 1)
      - run: echo "✅ Deployed → ${{ steps.deploy.outputs.url }}"
